name: Auto Trading Bot

on:
  schedule:
    # Run every 5 minutes during market hours (9:15 AM - 3:30 PM IST)
    # IST = UTC+5:30, so 9:15 AM IST = 3:45 AM UTC
    # Market hours in UTC: 3:45 AM - 10:00 AM
    - cron: '45,50,55 3 * * 1-5'      # 9:15-9:55 AM IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 4-9 * * 1-5'  # 10:00 AM - 3:00 PM IST
    - cron: '0 10 * * 1-5'            # 3:30 PM IST
  
  workflow_dispatch:  # Allow manual trigger

env:
  TZ: Asia/Kolkata  # Set timezone to IST

jobs:
  trading-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🔐 Create .env file
      run: |
        echo "SHOONYA_USER_ID=${{ secrets.SHOONYA_USER_ID }}" >> .env
        echo "SHOONYA_PASSWORD=${{ secrets.SHOONYA_PASSWORD }}" >> .env
        echo "SHOONYA_TOTP_KEY=${{ secrets.SHOONYA_TOTP_KEY }}" >> .env
        echo "SHOONYA_VENDOR_CODE=${{ secrets.SHOONYA_VENDOR_CODE }}" >> .env
        echo "SHOONYA_API_SECRET=${{ secrets.SHOONYA_API_SECRET }}" >> .env
    
    - name: ⏰ Check if market is open
      id: market_check
      run: |
        current_hour=$(date +%H)
        current_minute=$(date +%M)
        current_day=$(date +%u)  # 1=Monday, 7=Sunday
        
        # Check if it's a weekday (1-5)
        if [ $current_day -gt 5 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "📅 Weekend - Market closed"
          exit 0
        fi
        
        # Check if within market hours (9:15 AM - 3:30 PM)
        if [ $current_hour -lt 9 ] || [ $current_hour -gt 15 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Outside market hours"
          exit 0
        fi
        
        if [ $current_hour -eq 9 ] && [ $current_minute -lt 15 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Market not yet open"
          exit 0
        fi
        
        if [ $current_hour -eq 15 ] && [ $current_minute -gt 30 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Market closed"
          exit 0
        fi
        
        echo "is_open=true" >> $GITHUB_OUTPUT
        echo "✅ Market is open - Starting bot"
    
    - name: 🚀 Run trading bot
      if: steps.market_check.outputs.is_open == 'true'
      run: |
        echo "🎯 Starting high accuracy trading algorithm..."
        python run_github_actions.py
      timeout-minutes: 10
    
    - name: 📊 Upload trade results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: trading-results-${{ github.run_number }}
        path: |
          high_accuracy_trades_*.csv
          high_accuracy_updates_*.json
          capital_persistence.json
          auto_trader_scheduler.log
        retention-days: 30
    
    - name: 📈 Display summary
      if: always()
      run: |
        echo "================================"
        echo "📊 TRADING SESSION SUMMARY"
        echo "================================"
        
        # Find today's trade file
        today=$(date +%Y%m%d)
        trade_file="high_accuracy_trades_${today}.csv"
        
        if [ -f "$trade_file" ]; then
          trade_count=$(tail -n +2 "$trade_file" | wc -l)
          echo "✅ Trades executed today: $trade_count"
          
          if [ $trade_count -gt 0 ]; then
            echo ""
            echo "Recent trades:"
            tail -n 5 "$trade_file"
          fi
        else
          echo "ℹ️ No trades executed yet today"
        fi
        
        echo ""
        echo "================================"
