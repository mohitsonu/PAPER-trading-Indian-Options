name: Auto Trading Bot

on:
  schedule:
    # Run ONCE at market open (9:15 AM IST = 3:45 AM UTC)
    # This will run the FULL trading session from 9:15 AM to 3:30 PM
    - cron: '45 3 * * 1-5'  # Monday to Friday at 9:15 AM IST
  
  workflow_dispatch:  # Allow manual trigger

env:
  TZ: Asia/Kolkata  # Set timezone to IST

jobs:
  trading-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🔐 Create .env file
      run: |
        echo "SHOONYA_USER_ID=${{ secrets.SHOONYA_USER_ID }}" >> .env
        echo "SHOONYA_PASSWORD=${{ secrets.SHOONYA_PASSWORD }}" >> .env
        echo "SHOONYA_TOTP_KEY=${{ secrets.SHOONYA_TOTP_KEY }}" >> .env
        echo "SHOONYA_VENDOR_CODE=${{ secrets.SHOONYA_VENDOR_CODE }}" >> .env
        echo "SHOONYA_API_SECRET=${{ secrets.SHOONYA_API_SECRET }}" >> .env
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
    
    - name: ⏰ Check if market is open
      id: market_check
      run: |
        current_hour=$(date +%H)
        current_minute=$(date +%M)
        current_day=$(date +%u)  # 1=Monday, 7=Sunday
        
        # Check if it's a weekday (1-5)
        if [ $current_day -gt 5 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "📅 Weekend - Market closed"
          exit 0
        fi
        
        # Check if within market hours (9:15 AM - 3:30 PM)
        if [ $current_hour -lt 9 ] || [ $current_hour -gt 15 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Outside market hours"
          exit 0
        fi
        
        if [ $current_hour -eq 9 ] && [ $current_minute -lt 15 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Market not yet open"
          exit 0
        fi
        
        if [ $current_hour -eq 15 ] && [ $current_minute -gt 30 ]; then
          echo "is_open=false" >> $GITHUB_OUTPUT
          echo "⏰ Market closed"
          exit 0
        fi
        
        echo "is_open=true" >> $GITHUB_OUTPUT
        echo "✅ Market is open - Starting bot"
    
    - name: 🚀 Run trading bot
      if: steps.market_check.outputs.is_open == 'true'
      run: |
        echo "🎯 Starting FULL trading session (9:15 AM - 3:30 PM)..."
        echo "📊 This will run continuously until market close"
        python run_github_actions.py
      timeout-minutes: 400  # 6+ hours for full session
    
    - name: 📊 Upload trade results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-results-${{ github.run_number }}
        path: |
          high_accuracy_trades_*.csv
          high_accuracy_updates_*.json
          capital_persistence.json
          auto_trader_scheduler.log
          trading_report.html
        retention-days: 30
    
    - name: 💾 Organize and commit trade files to repository
      if: always()
      run: |
        # Create folders if they don't exist
        mkdir -p trade_journal/csv
        mkdir -p trade_journal/json
        mkdir -p trade_journal/logs
        
        # Move CSV files to csv folder
        if ls high_accuracy_trades_*.csv 1> /dev/null 2>&1; then
          mv high_accuracy_trades_*.csv trade_journal/csv/ 2>/dev/null || true
          echo "✅ Moved CSV files to trade_journal/csv/"
        fi
        
        # Move JSON files to json folder
        if ls high_accuracy_updates_*.json 1> /dev/null 2>&1; then
          mv high_accuracy_updates_*.json trade_journal/json/ 2>/dev/null || true
          echo "✅ Moved JSON files to trade_journal/json/"
        fi
        
        # Move capital persistence to json folder
        if [ -f "capital_persistence.json" ]; then
          mv capital_persistence.json trade_journal/json/ 2>/dev/null || true
          echo "✅ Moved capital_persistence.json to trade_journal/json/"
        fi
        
        # Move log files to logs folder
        if [ -f "auto_trader_scheduler.log" ]; then
          mv auto_trader_scheduler.log trade_journal/logs/ 2>/dev/null || true
          echo "✅ Moved log files to trade_journal/logs/"
        fi
        
        # Configure git
        git config --global user.name "Trading Bot"
        git config --global user.email "bot@trading.com"
        
        # Add and commit files
        git add trade_journal/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️ No new trade files to commit"
        else
          git commit -m "📊 Auto-save trade journal - $(date +'%Y-%m-%d %H:%M:%S IST')"
          git push
          echo "✅ Trade files committed to repository!"
        fi
    
    - name: 📈 Display summary
      if: always()
      run: |
        echo "================================"
        echo "📊 FULL SESSION SUMMARY"
        echo "================================"
        
        # Find today's trade file
        today=$(date +%Y%m%d)
        trade_file="high_accuracy_trades_${today}.csv"
        
        if [ -f "$trade_file" ]; then
          trade_count=$(tail -n +2 "$trade_file" | wc -l)
          echo "✅ Total trades executed: $trade_count"
          
          if [ $trade_count -gt 0 ]; then
            echo ""
            echo "📋 All trades:"
            cat "$trade_file"
          fi
        else
          echo "ℹ️ No trades executed today"
        fi
        
        # Show capital status
        if [ -f "trade_journal/json/capital_persistence.json" ]; then
          echo ""
          echo "💰 Capital Status:"
          cat trade_journal/json/capital_persistence.json
        fi
        
        echo ""
        echo "================================"
